_rpm_key:
  - key: https://download.virtualbox.org/virtualbox/debian/oracle_vbox_2016.asc
    fingerprint: B9F8D658297AF3EFC18D5CDFA2F683C52980AECF
    state: present

_yum_repository:
  - file: virtualbox
    name: virtualbox
    description: Fedora 43 - x86_64 - VirtualBox
    baseurl: http://download.virtualbox.org/virtualbox/rpm/fedora/43/x86_64
    enabled: true
    priority: "2"
    module_hotfixes: true
    gpgcheck: true
    gpgkey: https://download.virtualbox.org/virtualbox/debian/oracle_vbox_2016.asc
    state: present

_yum:
  - { state: latest, name: dkms }
  - { state: latest, name: elfutils-libelf-devel }
  - { state: latest, name: VirtualBox-7.2 }
